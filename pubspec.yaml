name: s_mate
description: "S-Mate - AI-powered travel companion app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.2.7
  shared_preferences: ^2.3.2
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  flutter_animate: ^4.5.0
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
